<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Fluxo de produto de dados jurídicos</title>
  <desc id="desc">Diagrama ilustrativo: fontes, staging, serving, analytics, apps e ML</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4f52"/>
      <stop offset="55%" stop-color="#132028"/>
      <stop offset="100%" stop-color="#1a3a42"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.2" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#1a6b6e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#b8956a" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="180" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="180" cy="600" r="160" fill="#1a6b6e" opacity="0.18" filter="url(#soft)"/>

  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.06">
    <path d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200M0 600H1200"/>
    <path d="M120 0V720M240 0V720M360 0V720M480 0V720M600 0V720M720 0V720M840 0V720M960 0V720M1080 0V720"/>
  </g>

  <!-- flow nodes -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="70" y="290" width="160" height="88" rx="10" fill="#f7fafb" fill-opacity="0.08" stroke="#d5e8e9" stroke-opacity="0.55"/>
    <text x="150" y="328" text-anchor="middle" fill="#d5e8e9" font-size="13" letter-spacing="1.5">FONTES</text>
    <text x="150" y="352" text-anchor="middle" fill="#f7fafb" font-size="18" font-weight="700">Coleta</text>

    <path d="M240 334H300" stroke="#b8956a" stroke-width="2" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0 0L6 3L0 6Z" fill="#b8956a"/>
      </marker>
    </defs>

    <rect x="310" y="290" width="160" height="88" rx="10" fill="#f7fafb" fill-opacity="0.08" stroke="#d5e8e9" stroke-opacity="0.55"/>
    <text x="390" y="328" text-anchor="middle" fill="#d5e8e9" font-size="13" letter-spacing="1.5">STAGING</text>
    <text x="390" y="352" text-anchor="middle" fill="#f7fafb" font-size="18" font-weight="700">ETL / raw</text>

    <path d="M480 334H540" stroke="#b8956a" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="550" y="270" width="200" height="128" rx="12" fill="#1a6b6e" fill-opacity="0.55" stroke="#d5e8e9" stroke-opacity="0.7"/>
    <text x="650" y="318" text-anchor="middle" fill="#d5e8e9" font-size="13" letter-spacing="1.5">SERVING</text>
    <text x="650" y="346" text-anchor="middle" fill="#f7fafb" font-size="20" font-weight="700">API + banco</text>
    <text x="650" y="372" text-anchor="middle" fill="#d5e8e9" font-size="14">multi-tenant · RLS</text>

    <!-- branches -->
    <path d="M750 334H810M810 334V210H860M810 334V334H860M810 334V460H860" stroke="#b8956a" stroke-width="2"/>
    <path d="M860 210H900" stroke="#b8956a" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M860 334H900" stroke="#b8956a" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M860 460H900" stroke="#b8956a" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="910" y="168" width="200" height="84" rx="10" fill="#f7fafb" fill-opacity="0.08" stroke="#d5e8e9" stroke-opacity="0.55"/>
    <text x="1010" y="205" text-anchor="middle" fill="#d5e8e9" font-size="13" letter-spacing="1.5">ANALYTICS</text>
    <text x="1010" y="230" text-anchor="middle" fill="#f7fafb" font-size="18" font-weight="700">BI / métricas</text>

    <rect x="910" y="292" width="200" height="84" rx="10" fill="#f7fafb" fill-opacity="0.08" stroke="#d5e8e9" stroke-opacity="0.55"/>
    <text x="1010" y="329" text-anchor="middle" fill="#d5e8e9" font-size="13" letter-spacing="1.5">APPS</text>
    <text x="1010" y="354" text-anchor="middle" fill="#f7fafb" font-size="18" font-weight="700">Web / jornadas</text>

    <rect x="910" y="416" width="200" height="84" rx="10" fill="#f7fafb" fill-opacity="0.08" stroke="#d5e8e9" stroke-opacity="0.55"/>
    <text x="1010" y="453" text-anchor="middle" fill="#d5e8e9" font-size="13" letter-spacing="1.5">IA</text>
    <text x="1010" y="478" text-anchor="middle" fill="#f7fafb" font-size="18" font-weight="700">ML / busca</text>
  </g>

  <text x="70" y="640" fill="#d5e8e9" font-size="14" letter-spacing="2" font-family="Segoe UI, Helvetica, Arial, sans-serif">PRODUTO PRÓPRIO · CÓDIGO PRIVADO · VISĂO DE ARQUITETURA</text>
  <text x="70" y="672" fill="#f7fafb" font-size="28" font-weight="700" font-family="Segoe UI, Helvetica, Arial, sans-serif">Situaçăo Jurídica</text>
</svg>
