name: Build portfolio site

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/build-site.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/build-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-portfolio-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_BASE: /
