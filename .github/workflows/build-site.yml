name: Build portfolio site

# CI roda em PR (gate de revisao) e apos merge na branch de deploy.
on:
  pull_request:
    branches: [docs/portfolio-hub, main]
    paths:
      - "web/**"
      - ".github/workflows/build-site.yml"
      - ".github/dependabot.yml"
  push:
    branches: [docs/portfolio-hub, main]
    paths:
      - "web/**"
      - ".github/workflows/build-site.yml"
      - ".github/dependabot.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-portfolio-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_BASE: /
