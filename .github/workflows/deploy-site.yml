name: Deploy portfolio site

# Publica em producao apos merge em docs/portfolio-hub.
# Nao depende apenas da integracao Git da Vercel (que pode falhar se a branch
# de producao ou o root directory nao estiverem corretos no painel).
on:
  push:
    branches: [docs/portfolio-hub]
    paths:
      - "web/**"
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-portfolio-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trigger Vercel deploy hook
        id: hook
        continue-on-error: true
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Deploy via Vercel CLI
        if: steps.hook.outputs.status != 'success'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Configure VERCEL_DEPLOY_HOOK ou VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID nos secrets do repositorio."
            exit 1
          fi
          vercel() {
            npx --yes --ignore-scripts "vercel@56.5.0" "$@"
          }
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
